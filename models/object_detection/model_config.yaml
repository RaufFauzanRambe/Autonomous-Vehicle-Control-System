model_name: yolov8_vehicle_detector
architecture: YOLOv8n
input_size:
- 640
- 640
num_classes: 13
confidence_threshold: 0.25
nms_threshold: 0.45
anchors:
  P3:
  - - 10
    - 13
  - - 16
    - 30
  - - 33
    - 23
  P4:
  - - 30
    - 61
  - - 62
    - 45
  - - 59
    - 119
  P5:
  - - 116
    - 90
  - - 156
    - 198
  - - 373
    - 326
backbone:
