# Training Configuration for Autonomous Vehicle AI Models

# Model Configuration
model:
  name: "resnet50"
  type: "detection"  # detection, segmentation, depth, lane, e2e
  pretrained: true
  num_classes: 10
  backbone: "resnet50"
  neck: "fpn"
  head: "retinanet"

# Dataset Configuration
dataset:
  name: "kitti"
  data_root: "./data"
  train_split: "train"
  val_split: "val"
  test_split: "test"
  num_workers: 4
  pin_memory: true
  image_size: [224, 224]
  normalize: true
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

# Training Hyperparameters
training:
  epochs: 100
  batch_size: 16
  learning_rate: 0.001
  weight_decay: 0.0001
  momentum: 0.9
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  seed: 42

# Optimizer
optimizer:
  type: "adamw"  # sgd, adam, adamw, lamb
  lr: 0.001
  weight_decay: 0.01
  betas: [0.9, 0.999]
  eps: 1.0e-8
  momentum: 0.9
  nesterov: true

  # Layer-wise LR scaling
  backbone_lr_scale: 0.1
  bias_lr_scale: 2.0
  no_weight_decay_keys:
    - "bias"
    - "LayerNorm.weight"
    - "BatchNorm"

# Learning Rate Scheduler
scheduler:
  type: "cosine"  # step, cosine, warmup, onecycle
  warmup_epochs: 5
  warmup_lr: 1.0e-6
  min_lr: 1.0e-6

  # Step scheduler
  milestones: [30, 60, 90]
  gamma: 0.1

  # OneCycle
  pct_start: 0.3
  div_factor: 25.0
  final_div_factor: 10000.0

# Data Augmentation
augmentation:
  level: "medium"  # none, light, medium, heavy
  
  # Geometric
  random_flip_h: true
  random_flip_v: false
  flip_prob: 0.5
  random_rotation: true
  rotation_range: 15.0
  random_scale: true
  scale_range: [0.8, 1.2]
  random_translation: true
  translation_range: 0.1

  # Color
  color_jitter: true
  brightness: 0.2
  contrast: 0.2
  saturation: 0.2
  hue: 0.1
  grayscale_prob: 0.1

  # Advanced
  mosaic: true
  mosaic_prob: 0.5
  mixup: true
  mixup_prob: 0.3
  mixup_alpha: 0.2
  cutmix: true
  cutmix_prob: 0.3
  cutmix_alpha: 1.0

  # Weather
  weather_augmentation: false
  rain_prob: 0.1
  snow_prob: 0.05
  fog_prob: 0.1

  # Domain-specific
  motion_blur: true
  motion_blur_prob: 0.1
  sensor_noise: true
  sensor_noise_prob: 0.1
  sensor_noise_std: 0.02

# Mixed Precision
amp:
  enabled: true
  dtype: "float16"  # float16, bfloat16
  init_scale: 65536.0
  growth_factor: 2.0
  backoff_factor: 0.5
  growth_interval: 2000

# Checkpointing
checkpoint:
  save_dir: "./checkpoints"
  save_freq: 5  # epochs
  save_best: true
  keep_last_n: 3
  save_optimizer: true
  save_scheduler: true
  save_rng_state: true

# Logging
logging:
  log_dir: "./logs"
  log_freq: 50  # batches
  tensorboard: true
  wandb: false
  wandb_project: "av-control"
  print_freq: 10

# Evaluation
evaluation:
  eval_freq: 1  # epochs
  eval_deterministic: true
  metrics:
    - "mAP"
    - "precision"
    - "recall"
    - "f1"

# Early Stopping
early_stopping:
  enabled: true
  patience: 15
  min_delta: 0.0001
  metric: "val_loss"
  mode: "min"

# Distributed Training
distributed:
  enabled: false
  backend: "nccl"
  init_method: "env://"
  world_size: 1
  find_unused_parameters: false
  sync_bn: false

# Hyperparameter Search
hpo:
  enabled: false
  framework: "optuna"  # optuna, grid, random
  n_trials: 50
  search_space:
    learning_rate:
      type: "log_uniform"
      low: 1.0e-5
      high: 1.0e-2
    weight_decay:
      type: "log_uniform"
      low: 1.0e-6
      high: 1.0e-2
    batch_size:
      type: "choice"
      values: [8, 16, 32, 64]

# ONNX Export
export:
  onnx_enabled: false
  onnx_path: null
  opset_version: 17
  simplify: true
  dynamic_shapes: true
  check_model: true
  test_inference: true

# Device
device: "auto"  # auto, cpu, cuda, cuda:0
