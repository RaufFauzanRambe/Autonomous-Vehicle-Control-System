# RL Hyperparameters
rl:
  algorithm: "ppo"  # Options: dqn, ppo, sac, td3
  seed: 42
  
  # Common hyperparameters
  gamma: 0.99
  learning_rate: 3.0e-4
  batch_size: 64
  buffer_size: 100000
  warmup_steps: 5000
  gradient_clip: 0.5

# DQN-specific
dqn:
  hidden_dims: [256, 256]
  dueling: true
  double_dqn: true
  use_per: true
  per_alpha: 0.6
  per_beta: 0.4
  per_epsilon: 1.0e-6
  n_step: 3
  epsilon_start: 1.0
  epsilon_end: 0.01
  epsilon_decay: 0.995
  epsilon_schedule: "exponential"  # exponential, linear, cosine
  target_update_freq: 1000
  soft_update: false
  tau: 0.005
  learning_starts: 5000

# PPO-specific
ppo:
  actor_hidden_dims: [256, 256]
  critic_hidden_dims: [256, 256]
  shared_backbone: false
  activation: "tanh"
  clip_range: 0.2
  clip_range_vf: null
  normalize_advantage: true
  entropy_coef: 0.01
  value_coef: 0.5
  max_grad_norm: 0.5
  gae_lambda: 0.95
  n_steps: 2048
  n_epochs: 10
  mini_batch_size: 64
  lr_schedule: "constant"
  target_kl: 0.015
  ortho_init: true
  ortho_init_gain: 1.414

# Network Architecture
network:
  type: "mlp"  # mlp, cnn, attention
  obs_dim: 48
  act_dim: 3
  hidden_dim: 256
  num_hidden_layers: 2
  activation: "relu"
  use_layer_norm: true
  use_dropout: false
  dropout_rate: 0.1
  
  # CNN settings
  cnn:
    channels: [32, 64, 128]
    kernel_sizes: [8, 4, 3]
    strides: [4, 2, 1]
    hidden_dim: 256
  
  # Attention settings
  attention:
    num_heads: 4
    num_transformer_layers: 2
    attention_dropout: 0.1

# Environment
environment:
  scenario: "free_driving"
  weather: "clear"
  observation_mode: "state_vector"
  max_episode_steps: 1000
  time_step: 0.1
  num_traffic_vehicles: 5
  traffic_density: 0.3
  pedestrian_density: 0.1
  sensor_noise: 0.01
  frame_skip: 1

  # Vehicle dynamics
  vehicle:
    wheelbase: 2.9
    max_steer: 0.6
    max_speed: 25.0
    max_accel: 3.0
    max_decel: -8.0
    mass: 1500.0

  # Road configuration
  road:
    lane_width: 3.7
    num_lanes: 2
    road_length: 500.0
    speed_limit: 13.9

# Reward Function
reward:
  strategy: "linear"
  weights:
    speed: 1.0
    safety: 3.0
    comfort: 0.5
    lane_keeping: 1.5
    goal_reaching: 2.0
    traffic_rules: 2.5
    progress: 1.0
    efficiency: 0.3
  target_speed: 11.1
  collision_penalty: -100.0
  near_miss_penalty: -20.0
  lane_departure_penalty: -5.0
  goal_reached_reward: 100.0

# Training
training:
  max_episodes: 10000
  max_steps_per_episode: 1000
  train_freq: 4
  gradient_steps: 1
  
  # Evaluation
  eval_freq: 1000
  n_eval_episodes: 10
  eval_deterministic: true
  
  # Checkpointing
  save_freq: 5000
  save_path: "./checkpoints"
  save_best: true
  keep_last_n_checkpoints: 5
  
  # Logging
  log_freq: 100
  log_dir: "./logs"
  tensorboard_log: "./tensorboard"
  
  # Early stopping
  early_stop: false
  early_stop_patience: 10
  early_stop_metric: "eval_avg_reward"
  early_stop_threshold: null
  
  # Curriculum
  use_curriculum: false
  curriculum_stages: 5
  curriculum_eval_threshold: 0.8
  
  # Resource limits
  max_training_time: .inf
  max_total_steps: 10000000

# Device
device: "auto"  # auto, cpu, cuda
