# ============================================================================
# Lane Detection System Configuration
# Autonomous Vehicle Control System - AI Engine
# ============================================================================

# Camera intrinsic parameters
camera:
  image_width: 1280
  image_height: 720
  # Intrinsic matrix (3x3)
  intrinsic_matrix:
    - [960.0, 0.0, 640.0]
    - [0.0, 960.0, 360.0]
    - [0.0, 0.0, 1.0]
  # Distortion coefficients [k1, k2, p1, p2, k3]
  distortion_coefficients: [-0.32, 0.12, 0.0, 0.0, -0.02]
  # Camera extrinsic: mounting position relative to vehicle rear axle
  mounting:
    x: 1.5        # meters forward from rear axle
    y: 0.0        # meters lateral offset (centered)
    z: 1.2        # meters above ground
    pitch: -15.0  # degrees (negative = tilted down)
    yaw: 0.0      # degrees
    roll: 0.0     # degrees
  focal_length_mm: 6.0
  sensor_size_mm: [4.8, 3.6]
  fps: 30

# Preprocessing settings
preprocessing:
  # Region of Interest polygon (normalized coordinates 0-1)
  roi_vertices:
    - [0.1, 1.0]    # bottom-left
    - [0.4, 0.4]    # top-left
    - [0.6, 0.4]    # top-right
    - [0.9, 1.0]    # bottom-right
  # Color conversion
  color_space: "HLS"   # Options: HLS, HSV, LAB, YUV
  # Histogram equalization
  equalize_histogram: true
  equalize_channel: 2   # Channel index to equalize (L in HLS)
  # Gaussian blur kernel
  gaussian_kernel: [5, 5]
  gaussian_sigma: 1.4
  # CLAHE (Contrast Limited Adaptive Histogram Equalization)
  use_clahe: true
  clahe_clip_limit: 2.0
  clahe_grid_size: [8, 8]
  # Undistortion
  apply_undistort: true
  # Downsampling for performance (1.0 = no change)
  downsample_factor: 0.75

# Edge detection settings
edge_detection:
  method: "canny"   # Options: canny, sobel, combined, adaptive
  # Canny parameters
  canny:
    low_threshold: 50
    high_threshold: 150
    aperture_size: 3    # Sobel kernel size (3, 5, 7)
    use_l2_gradient: true
  # Sobel parameters
  sobel:
    kernel_size: 3
    x_weight: 1.0       # Weight for x-gradient
    y_weight: 0.3       # Weight for y-gradient
    threshold: 30
    magnitude_threshold: 50
    direction_threshold: [0.3, 1.2]  # Radians (17° - 69°)
  # Color-based edge detection
  color_edge:
    white_h_range: [0, 180]
    white_s_range: [0, 30]
    white_v_range: [200, 255]
    yellow_h_range: [15, 35]
    yellow_s_range: [100, 255]
    yellow_v_range: [100, 255]
  # Adaptive thresholding
  adaptive:
    block_size: 11
    c_offset: 2
    use_otsu: true
  # Combined edge method weights
  combined_weights:
    canny: 0.5
    sobel: 0.3
    color: 0.2

# Lane filter settings
lane_filter:
  # Angle constraints (degrees from horizontal)
  min_angle: 20.0
  max_angle: 85.0
  # Minimum line length in pixels
  min_length: 30
  # Maximum line gap in pixels (for probabilistic Hough)
  max_line_gap: 15
  # Hough transform parameters
  hough:
    rho: 1                   # Distance resolution (pixels)
    theta: 0.0174532925      # Angle resolution (radians = 1 degree)
    threshold: 40            # Accumulator threshold
    min_line_length: 30
    max_line_gap: 15
  # Parallel constraint
  parallel:
    max_angle_diff: 10.0     # Max angle difference between parallel lanes
    max_distance: 600        # Max pixel distance between parallel lanes
    min_distance: 100        # Min pixel distance between parallel lanes
  # Left/right separation
  midpoint_x_ratio: 0.5      # Fraction of image width for left/right split
  # Merge nearby lines
  merge_distance: 20         # Pixels
  merge_angle_diff: 10       # Degrees

# Perspective transform (bird's eye view)
perspective_transform:
  # Source points (image coordinates)
  src_points:
    - [220, 720]    # bottom-left
    - [560, 475]    # top-left
    - [720, 475]    # top-right
    - [1060, 720]   # bottom-right
  # Destination points (bird's eye view)
  dst_points:
    - [320, 720]
    - [320, 0]
    - [960, 0]
    - [960, 720]
  # Physical dimensions of the bird's eye view (meters)
  bev:
    width: 3.7       # Lane width in meters (standard US lane)
    length: 30.0     # Forward visibility in meters
    pixels_per_meter_x: 173   # 640 / 3.7
    pixels_per_meter_y: 24     # 720 / 30

# Lane classification settings
lane_classifier:
  # Solid vs dashed detection
  dash_analysis:
    min_dash_length: 15     # Minimum dash length in pixels
    max_dash_length: 80     # Maximum dash length in pixels
    min_gap_length: 15      # Minimum gap between dashes
    max_gap_length: 120     # Maximum gap between dashes
    continuity_threshold: 0.6  # Ratio for solid vs dashed classification
  # Double lane detection
  double_lane:
    max_separation: 25      # Max pixels between double lines
    min_separation: 5       # Min pixels between double lines
    intensity_similarity: 0.7  # Similarity threshold for parallel lines
  # Merging lane detection
  merging:
    convergence_angle: 5.0  # Degrees: angle at which lanes converge
    min_tracking_distance: 50  # Pixels: distance to track convergence
  # Color classification
  color_classification:
    white_hsv: [[0, 0, 200], [180, 30, 255]]
    yellow_hsv: [[15, 80, 100], [35, 255, 255]]
    color_sample_region: 5  # Pixels around line to sample
    confidence_threshold: 0.6

# Lane curvature settings
lane_curvature:
  # Polynomial fitting
  polynomial_degree: 2      # Quadratic fit
  min_sample_points: 10     # Minimum points for fitting
  # Sliding window for histogram-based detection
  sliding_window:
    n_windows: 9
    window_width: 100       # Pixels
    min_pixels: 50          # Minimum pixels to recenter window
    margin: 80              # Search margin around previous fit
  # Curvature estimation
  ym_per_pix: 0.04167       # Meters per pixel in y (30m / 720px)
  xm_per_pix: 0.00578       # Meters per pixel in x (3.7m / 640px)
  # Smoothing
  temporal_smoothing_alpha: 0.3  # EMA smoothing factor (0 = no update, 1 = no smoothing)
  # Range for valid curvature radius (meters)
  min_radius: 100.0
  max_radius: 5000.0
  # Heading angle estimation
  heading:
    lookahead_distance: 10.0  # Meters ahead for heading calculation
    max_heading_angle: 45.0   # Degrees: max valid heading angle

# Lane tracking (Kalman filter) settings
lane_tracker:
  # Kalman filter parameters
  kalman:
    process_noise: 0.01     # Q matrix scaling factor
    measurement_noise: 0.1  # R matrix scaling factor
  # Lane ID management
  lane_id:
    max_missing_frames: 5   # Frames before lane ID is dropped
    max_lanes: 6            # Maximum number of tracked lanes
    assignment_threshold: 50 # Max pixel distance for ID assignment
  # Temporal smoothing
  smoothing:
    alpha: 0.3              # EMA smoothing factor
    min_confidence: 0.3     # Minimum detection confidence to track
    max_velocity: 5.0       # Max lateral velocity (pixels/frame)
  # Lane position prediction
  prediction:
    use_constant_velocity: true
    max_prediction_frames: 3  # Frames to predict ahead if detection lost
    velocity_decay: 0.9       # Decay factor for predicted velocity

# Lane departure warning settings
lane_departure_warning:
  enabled: true
  # Warning thresholds (meters from lane center)
  warning_threshold: 0.5      # Soft warning
  critical_threshold: 0.8     # Critical warning
  # Time to lane crossing (seconds)
  tlc_warning: 2.0            # Soft warning TLC
  tlc_critical: 0.5           # Critical warning TLC
  # Warning type configuration
  alert_types:
    visual: true
    haptic: true
    audible: true
  # Cooldown
  warning_cooldown_ms: 1000   # Minimum time between warnings
  # Vehicle parameters
  vehicle:
    width: 1.8                # Vehicle width in meters
    lane_width: 3.7           # Standard lane width in meters
  # Hysteresis to prevent flickering
  hysteresis:
    activate_offset: 0.5
    deactivate_offset: 0.35

# Visualization settings
visualization:
  # Lane line rendering
  lane_color:
    left: [0, 255, 0]       # Green for left lane
    right: [0, 255, 255]    # Yellow for right lane
    center: [255, 0, 0]     # Red for center line
    predicted: [255, 165, 0] # Orange for predicted
  lane_thickness: 3
  # Lane fill
  lane_fill_alpha: 0.2
  lane_fill_color: [0, 255, 0]
  # Sliding windows
  show_sliding_windows: true
  sliding_window_color: [255, 255, 0]
  # Curvature text
  show_curvature: true
  curvature_font_scale: 0.7
  curvature_position: [50, 50]
  # Departure warning
  warning_color: [0, 0, 255]
  critical_color: [0, 0, 200]
  # Bird's eye view
  show_bev: true
  bev_size: [320, 240]
  bev_position: [960, 10]
  # Info overlay
  show_fps: true
  show_confidence: true
  info_font_scale: 0.5

# Benchmark settings
benchmark:
  # Dataset paths
  dataset_dir: "./data/lane_datasets"
  # Evaluation metrics
  metrics:
    - accuracy
    - precision
    - recall
    - f1_score
    - iou
    - processing_time
  # Performance targets
  targets:
    min_accuracy: 0.90
    min_fps: 15
    max_latency_ms: 66
  # Robustness testing
  robustness:
    weather_conditions:
      - clear
      - rain
      - fog
      - snow
      - night
    lighting_conditions:
      - daytime
      - dusk
      - night
      - backlit
    noise_levels: [0, 10, 20, 30, 50]
  # Stress testing
  stress:
    max_concurrent_frames: 10
    duration_seconds: 60

# Logging
logging:
  level: "INFO"    # DEBUG, INFO, WARNING, ERROR
  file: "./logs/lane_detection.log"
  max_file_size_mb: 50
  backup_count: 5
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
