# ---------------------------------------------------------------------------
# Evaluation Configuration
# ---------------------------------------------------------------------------
evaluation:
  # Metrics to compute
  metrics:
    - "miou"                      # Mean Intersection over Union
    - "pixel_accuracy"            # Global pixel accuracy
    - "mean_pixel_accuracy"       # Mean per-class pixel accuracy
    - "mean_dice"                 # Mean Dice coefficient
    - "frequency_weighted_iou"    # Frequency-weighted IoU
    - "boundary_f1"               # Boundary F1 score
    - "kappa"                     # Cohen's Kappa

  # Boundary F1 tolerance (pixels)
  boundary_tolerance: 2

  # Ignore label in evaluation
  ignore_label: 255

  # Per-class evaluation
  per_class_metrics: true

  # Generate visualization samples
  visualize: true
  num_vis_samples: 10             # Number of samples to visualize
  vis_output_dir: "eval_results"

  # Generate JSON report
  generate_report: true
  report_path: "eval_results/evaluation_report.json"

  # Confusion matrix
  compute_confusion_matrix: true

# ---------------------------------------------------------------------------
# Post-Processing Configuration
# ---------------------------------------------------------------------------
postprocessing:
  # CRF refinement
  use_crf: false
  crf_iterations: 5
  crf_bilateral_weight: 5.0
  crf_spatial_sigma: 3.0
  crf_color_sigma: 10.0

  # Morphological operations
  use_morphology: true
  morph_operation: "close_open"   # close, open, close_open, open_close
  morph_kernel_size: 5
  morph_iterations: 1

  # Hole filling
  fill_holes: true

  # Small region removal
  remove_small_regions: true
  min_region_area: 256

  # Boundary smoothing
  smooth_boundaries: false
  boundary_smooth_iterations: 1

  # Confidence filtering
  use_confidence_filter: false
  confidence_threshold: 0.5

# ---------------------------------------------------------------------------
# Inference Configuration
# ---------------------------------------------------------------------------
inference:
  # Model checkpoint path (for evaluation/inference)
  checkpoint_path: ""

  # Test-time augmentation
  use_tta: false
  tta_transforms:
    - "original"
    - "flip_horizontal"
    # - "flip_vertical"
    # - "scale_0.5"
    # - "scale_1.5"

  # Multi-scale inference
  use_multiscale: false
  scales: [0.5, 0.75, 1.0, 1.25, 1.5]

  # Output format
  output_format: "mask"           # mask, probabilities, logits
  save_probabilities: false
  save_logits: false

  # Sliding window for large images
  use_sliding_window: false
  window_size: [512, 512]
  window_overlap: 0.25

# ---------------------------------------------------------------------------
# Hardware Configuration
# ---------------------------------------------------------------------------
hardware:
  # Device: cpu, cuda, cuda:0, cuda:1, etc.
  device: "cuda"

  # Data parallel training
  use_data_parallel: false
  gpu_ids: [0]

  # Distributed training
  use_distributed: false
  world_size: 1
  rank: 0
  dist_url: "tcp://localhost:29500"
  dist_backend: "nccl"

  # Benchmark mode (CUDNN)
  cudnn_benchmark: true

# ---------------------------------------------------------------------------
# Logging Configuration
# ---------------------------------------------------------------------------
logging:
  level: "INFO"                   # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  log_file: "segmentation.log"
  log_to_console: true
  log_to_file: true
